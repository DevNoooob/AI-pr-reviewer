<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Reviewer</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<main class="shell">
    <section class="intro" aria-labelledby="page-title">
        <div>
            <p class="eyebrow">GitHub Pull Request Review</p>
            <h1 id="page-title">AI PR Reviewer</h1>
            <p class="summary">
                &#36755;&#20837; GitHub PR &#22320;&#22336;&#65292;&#31995;&#32479;&#20250;&#25289;&#21462; PR &#22522;&#30784;&#20449;&#24687;&#21644;&#25991;&#20214; Diff&#65292;&#24182;&#29983;&#25104;&#32467;&#26500;&#21270; Markdown &#35780;&#23457;&#25253;&#21578;&#12290;
            </p>
        </div>

        <form class="review-form" id="reviewForm">
            <label for="prUrl">PR &#22320;&#22336;</label>
            <div class="input-row">
                <input
                        id="prUrl"
                        name="prUrl"
                        type="url"
                        placeholder="https://github.com/owner/repo/pull/123"
                        autocomplete="url"
                        required
                >
                <button type="submit" id="submitButton">&#24320;&#22987;&#20998;&#26512;</button>
            </div>
            <p class="hint">&#25903;&#25345;&#26631;&#20934; GitHub Pull Request &#38142;&#25509;&#12290;</p>
        </form>
    </section>

    <section class="workspace" aria-live="polite">
        <aside class="side-column">
            <section class="meta-panel" id="metaPanel">
                <div class="empty-state">
                    <span class="empty-icon">PR</span>
                    <h2>&#31561;&#24453;&#20998;&#26512;</h2>
                    <p>&#25552;&#20132; PR &#38142;&#25509;&#21518;&#65292;&#36825;&#37324;&#20250;&#23637;&#31034;&#26631;&#39064;&#12289;&#20998;&#25903;&#12289;&#29366;&#24577;&#21644;&#20998;&#26512;&#26102;&#38388;&#12290;</p>
                </div>
            </section>

            <section class="history-panel">
                <div class="history-header">
                    <div>
                        <p class="eyebrow">History</p>
                        <h2>&#21382;&#21490;&#20998;&#26512;&#35760;&#24405;</h2>
                    </div>
                    <button class="icon-button" type="button" id="refreshHistoryButton" title="Refresh history">&#8635;</button>
                </div>
                <div class="history-list" id="historyList">
                    <p class="history-empty">&#26242;&#26080;&#21382;&#21490;&#35760;&#24405;&#12290;</p>
                </div>
            </section>
        </aside>

        <article class="report-panel">
            <div class="report-header">
                <div>
                    <p class="eyebrow">Markdown Report</p>
                    <h2>&#35780;&#23457;&#32467;&#26524;</h2>
                </div>
                <button class="secondary-button" type="button" id="copyButton" disabled>&#22797;&#21046; Markdown</button>
            </div>
            <div class="report-content empty-report" id="reportContent">
                <p>AI &#29983;&#25104;&#30340;&#35780;&#23457;&#25253;&#21578;&#20250;&#20197; Markdown &#26684;&#24335;&#23637;&#31034;&#22312;&#36825;&#37324;&#12290;</p>
            </div>
        </article>
    </section>
</main>

<script src="./app.js"></script>
</body>
</html>
